<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetas</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
<div class="navbar">

    <button class="menu-hamburguesa" onclick="toggleLogin()">☰</button>

    <input class="buscador" placeholder="Buscar recetas...">

    <div class="nav-links">
        <a onclick="showPage('recetas')">Recetas</a>
        <a onclick="showPage('nosotros')">Sobre nosotros</a>
    </div>

</div>
</header>

<!-- LOGIN -->
<div id="login-panel" class="login-panel">
    <h3>Login</h3>

    <input type="text" id="username" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">

    <p id="login-error"></p>

    <button onclick="login()">Entrar</button>
</div>

<!-- PAGINA RECETAS -->
<div id="page-recetas" class="page">
    <main>
        <!-- 🔥 CORREGIDO ID -->
        <section class="recetas" id="contenedor-recetas"></section>
    </main>
</div>

<!-- PAGINA NOSOTROS -->
<div id="page-nosotros" class="page" style="display:none;">
    <main>
        <h2>Sobre nosotros</h2>
        <p>Somos una web de recetas 🍝</p>
    </main>
</div>

<!-- PANEL ADMIN -->
<div id="admin-panel" class="admin-panel" style="display:none;">
    <h2>Panel Admin</h2>
    <div id="admin-recetas"></div>
</div>

<script>
// CAMBIO DE PAGINAS
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => {
        p.style.display = 'none';
    });

    document.getElementById('page-' + id).style.display = 'block';

    if (id === "recetas") {
        cargarRecetas();
    }
}

// LOGIN PANEL
function toggleLogin() {
    document.getElementById('login-panel').classList.toggle('open');
}

// CERRAR LOGIN SI CLICK FUERA
document.addEventListener("click", function(e) {
    const panel = document.getElementById("login-panel");
    const btn = document.querySelector(".menu-hamburguesa");

    if (!panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.remove("open");
    }
});

// LOGIN REAL
function login() {
    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            document.getElementById("login-panel").style.display = "none";
            document.getElementById("admin-panel").style.display = "block";
            cargarAdmin();
        } else {
            const error = document.getElementById("login-error");
            error.innerText = data.error;
            error.style.display = "block";
        }
    });
}

// ✅ CARGAR RECETAS (ÚNICA FUNCIÓN)
function cargarRecetas() {
    fetch("/recetas")
        .then(res => res.json())
        .then(data => {
            const contenedor = document.getElementById("contenedor-recetas");

            if (!contenedor) {
                console.error("No existe contenedor-recetas");
                return;
            }

            contenedor.innerHTML = "";

            data.forEach(receta => {
                const div = document.createElement("article");
                div.className = "receta";
                div.innerHTML = `<p>${receta.nombre}</p>`;
                contenedor.appendChild(div);
            });
        })
        .catch(err => console.error("Error:", err));
}

// PANEL ADMIN
function cargarAdmin() {
    fetch("/recetas")
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById("admin-recetas");
        container.innerHTML = "";

        data.forEach(r => {
            container.innerHTML += `
                <article class="receta admin-card">
                    
                    <div class="admin-overlay">
                        <input id="receta-${r.id}" value="${r.nombre}">
                        <div class="admin-botones">
                            <button onclick="editar(${r.id})">Guardar</button>
                            <button onclick="borrar(${r.id})">Borrar</button>
                        </div>
                    </div>

                    <p>${r.nombre}</p>

                </article>
            `;
        });
    });
}

// EDITAR
function editar(id) {
    const nombre = document.getElementById("receta-" + id).value;

    fetch("/editar_receta/" + id, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({nombre})
    })
    .then(() => {
        cargarAdmin();
        cargarRecetas();
    });
}

// BORRAR
function borrar(id) {
    fetch("/borrar_receta/" + id, {
        method: "POST"
    })
    .then(() => {
        cargarAdmin();
        cargarRecetas();
    });
}

// INICIO (solo una vez)
window.onload = function () {
    cargarRecetas();
};
</script>

</body>
</html>
